<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ピアノ練習">
  <meta name="theme-color" content="#0a0a0a">
  <title>ピアノ練習記録</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:        #080808;
      --bg-card:   #141414;
      --bg-card2:  #1e1e1e;
      --bg-input:  #111111;
      --gold:      #d4ae52;
      --gold-lt:   #f0d080;
      --gold-dim:  rgba(212,174,82,0.18);
      --ivory:     #ffffff;
      --text:      #f5f2e8;
      --text-dim:  #8a877c;
      --border:    #2a2a2a;
      --border-lt: #3a3a3a;
      --danger:    #c03535;
      --grad-clr:  #5ec080;
      --grad-dim:  rgba(94,192,128,0.15);
      --grad-bdr:  rgba(94,192,128,0.45);
    }

    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
      font-weight: 500;
      min-height: 100vh;
      overflow-x: hidden;
      padding-bottom: env(safe-area-inset-bottom, 20px);
      -webkit-font-smoothing: antialiased;
    }

    /* ─── HEADER ─── */
    .header {
      background: linear-gradient(180deg, #1a1a18 0%, #0a0a0a 100%);
      border-bottom: 1px solid #2a2a20;
      padding: 20px 16px 0;
      text-align: center;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 4px 24px rgba(0,0,0,0.8);
    }
    .header h1 {
      font-size: 32px; font-weight: 800; letter-spacing: 6px;
      color: var(--gold-lt); text-transform: uppercase;
      font-family: 'Georgia', serif;
    }
    .header p {
      font-size: 16px; color: var(--text-dim);
      letter-spacing: 3px; margin: 6px 0 0;
      font-weight: 600; text-transform: uppercase;
    }
    .piano-svg {
      display: block; width: 100%; max-width: 420px;
      margin: 12px auto 0;
    }

    /* ─── LAYOUT ─── */
    .container {
      max-width: 580px; margin: 0 auto;
      padding: 16px 14px;
      display: flex; flex-direction: column; gap: 14px;
    }

    /* ─── CARD ─── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-lt);
      border-radius: 16px; padding: 20px 18px;
    }
    .card-title {
      font-size: 16px; font-weight: 700; letter-spacing: 3px;
      color: var(--gold-lt); text-transform: uppercase;
      margin-bottom: 18px;
    }

    /* ─── SONG SECTION ─── */
    .add-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .song-input {
      flex: 1; background: var(--bg-input);
      border: 1px solid var(--border-lt); border-radius: 10px;
      color: #fff; font-size: 22px; font-weight: 600;
      padding: 16px; font-family: inherit;
      outline: none; transition: border-color 0.2s; min-width: 0;
    }
    .song-input::placeholder { color: var(--text-dim); font-weight: 400; }
    .song-input:focus { border-color: var(--gold); }

    .btn-add {
      background: var(--gold); border: none; border-radius: 10px;
      color: #000; font-size: 34px; line-height: 1;
      font-weight: 800; width: 62px; flex-shrink: 0;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-add:active { background: var(--gold-lt); }

    .song-list { display: flex; flex-direction: column; gap: 7px; }

    .song-item {
      display: flex; align-items: center; gap: 12px;
      background: var(--bg-card2); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 12px;
      cursor: pointer; transition: all 0.2s;
      user-select: none; min-height: 68px;
    }
    .song-item.selected {
      border-color: var(--gold); background: var(--gold-dim);
    }

    .radio-dot {
      width: 22px; height: 22px;
      border: 2px solid var(--border-lt); border-radius: 50%;
      flex-shrink: 0; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .song-item.selected .radio-dot {
      border-color: var(--gold); background: var(--gold);
    }
    .radio-dot::after {
      content: ''; width: 8px; height: 8px;
      border-radius: 50%; background: #000;
      opacity: 0; transition: opacity 0.2s;
    }
    .song-item.selected .radio-dot::after { opacity: 1; }

    .song-name {
      flex: 1; font-size: 22px; font-weight: 700;
      color: var(--text); overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .song-item.selected .song-name { color: var(--gold-lt); }

    /* 練習終了ボタン */
    .btn-grad {
      background: var(--grad-dim);
      border: 1px solid var(--grad-bdr);
      border-radius: 8px; color: var(--grad-clr);
      font-size: 14px; font-weight: 800;
      padding: 8px 10px; cursor: pointer; flex-shrink: 0;
      white-space: nowrap; transition: all 0.2s;
      line-height: 1.2;
    }
    .btn-grad:active {
      background: rgba(94,192,128,0.3); border-color: var(--grad-clr);
    }

    /* 削除ボタン */
    .btn-del {
      background: none; border: none;
      color: var(--text-dim); font-size: 22px;
      padding: 6px 8px; cursor: pointer; flex-shrink: 0;
      border-radius: 8px; transition: all 0.15s; line-height: 1;
    }
    .btn-del:active { color: var(--danger); background: rgba(192,53,53,0.12); }

    .empty-msg {
      text-align: center; color: var(--text-dim);
      font-size: 18px; font-weight: 500; padding: 16px 0 4px;
    }

    /* ─── TIMER ─── */
    .timer-display { text-align: center; padding: 12px 0 24px; }
    .timer-time {
      font-size: 72px; font-weight: 800; color: #ffffff;
      letter-spacing: 2px; font-variant-numeric: tabular-nums;
      line-height: 1; transition: color 0.3s, text-shadow 0.3s;
      font-family: -apple-system, 'SF Mono', 'Helvetica Neue', Arial, sans-serif;
    }
    .timer-time.running {
      color: var(--gold-lt);
      text-shadow: 0 0 60px rgba(212,174,82,0.55), 0 0 20px rgba(212,174,82,0.3);
    }
    .timer-song-label {
      margin-top: 14px; font-size: 26px; font-weight: 700;
      color: var(--gold-lt); letter-spacing: 1px;
      min-height: 34px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; padding: 0 12px;
    }

    .btn-start {
      width: 100%;
      background: linear-gradient(135deg, #b08828 0%, #d4ae52 40%, #e0c060 60%, #b08828 100%);
      border: none; border-radius: 14px;
      color: #000000; font-size: 24px; font-weight: 800;
      letter-spacing: 3px; padding: 0 20px; height: 82px;
      cursor: pointer; text-transform: uppercase;
      transition: all 0.2s; position: relative; overflow: hidden;
      box-shadow: 0 4px 20px rgba(212,174,82,0.25);
    }
    .btn-start::before {
      content: ''; position: absolute; inset: 0;
      background: rgba(255,255,255,0.1);
      opacity: 0; transition: opacity 0.15s;
    }
    .btn-start:active::before { opacity: 1; }
    .btn-start:active { transform: scale(0.97); }
    .btn-start.running {
      background: linear-gradient(135deg, #7a1818 0%, #c03535 40%, #d84040 60%, #7a1818 100%);
      color: #fff; box-shadow: 0 4px 20px rgba(192,53,53,0.35);
    }
    .btn-start:disabled {
      background: var(--bg-card2); color: var(--text-dim);
      cursor: not-allowed; border: 1px solid var(--border-lt);
      box-shadow: none; font-size: 22px;
    }
    .timer-ring {
      display: none; width: 14px; height: 14px;
      border-radius: 50%; background: var(--gold);
      display: inline-block; margin-right: 10px;
      vertical-align: middle;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .btn-start:not(.running) .timer-ring { display: none; }
    .btn-start.running .timer-ring { display: inline-block; background: #ff8080; }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.4; transform:scale(0.65); }
    }

    /* ─── STATS ─── */
    .tabs {
      display: flex; background: var(--bg-input);
      border-radius: 12px; padding: 5px; gap: 5px; margin-bottom: 16px;
    }
    .tab {
      flex: 1; background: none; border: none;
      color: var(--text-dim); font-size: 20px; font-weight: 700;
      padding: 14px 6px; border-radius: 8px;
      cursor: pointer; transition: all 0.2s; letter-spacing: 1px;
    }
    .tab.active {
      background: var(--bg-card2); color: var(--gold-lt);
      border: 1px solid var(--border-lt);
    }
    .stats-list { display: flex; flex-direction: column; gap: 8px; }
    .stat-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 18px 16px; background: var(--bg-card2);
      border: 1px solid var(--border); border-radius: 12px; min-height: 72px;
    }
    .stat-song {
      font-size: 22px; font-weight: 700; color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      flex: 1; padding-right: 12px;
    }
    .stat-mins {
      font-size: 36px; font-weight: 700; color: var(--gold-lt);
      font-variant-numeric: tabular-nums; white-space: nowrap; flex-shrink: 0;
    }
    .stat-unit { font-size: 18px; font-weight: 600; color: var(--text-dim); margin-left: 4px; }
    .stats-total {
      display: flex; justify-content: flex-end; align-items: baseline;
      gap: 6px; padding: 14px 4px 0;
      border-top: 1px solid var(--border); margin-top: 12px;
    }
    .stats-total-label { font-size: 18px; font-weight: 600; color: var(--text-dim); letter-spacing: 1px; }
    .stats-total-val   { font-size: 30px; font-weight: 800; color: var(--gold-lt); font-variant-numeric: tabular-nums; }

    /* ─── CHART ─── */
    .chart-wrap { position: relative; height: 240px; }

    /* ─── カスタム凡例 ─── */
    .chart-legend {
      display: flex; flex-wrap: wrap;
      gap: 8px 16px;
      margin-top: 16px; padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .legend-item {
      display: flex; align-items: center; gap: 8px; min-width: 0;
    }
    .legend-swatch {
      width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0;
    }
    .legend-label-wrap {
      display: flex; align-items: baseline; gap: 5px; min-width: 0;
    }
    .legend-name {
      font-size: 15px; font-weight: 700; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 130px;
    }
    .legend-mins {
      font-size: 13px; font-weight: 700; color: var(--gold-lt);
      white-space: nowrap; flex-shrink: 0;
    }
    .legend-archived { font-size: 12px; color: var(--grad-clr); flex-shrink: 0; }
    .chart-no-data {
      text-align: center; color: var(--text-dim);
      font-size: 16px; font-weight: 600; padding: 40px 0;
    }

    /* ─── ARCHIVE SECTION ─── */
    .archive-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 18px;
    }
    .archive-header .card-title { margin-bottom: 0; flex: 1; }
    .archive-count {
      background: var(--grad-dim); border: 1px solid var(--grad-bdr);
      color: var(--grad-clr); font-size: 15px; font-weight: 800;
      padding: 4px 12px; border-radius: 20px;
    }

    .archive-list { display: flex; flex-direction: column; gap: 14px; }

    .archive-card {
      background: var(--bg-card2);
      border: 1px solid rgba(94,192,128,0.25);
      border-radius: 12px; overflow: hidden;
    }
    .archive-card-header {
      display: flex; align-items: center; gap: 10px;
      padding: 16px 16px 0;
    }
    .archive-icon {
      font-size: 24px; flex-shrink: 0;
    }
    .archive-name {
      flex: 1; font-size: 22px; font-weight: 700; color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .archive-stats-badge {
      background: rgba(212,174,82,0.12);
      border: 1px solid rgba(212,174,82,0.3);
      border-radius: 8px; padding: 4px 10px;
      font-size: 14px; font-weight: 700; color: var(--gold-lt);
      white-space: nowrap; flex-shrink: 0;
    }

    .archive-body { padding: 14px 16px 16px; }

    .archive-date-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
    }
    .archive-date-label {
      font-size: 16px; font-weight: 700; color: var(--text-dim);
      white-space: nowrap; flex-shrink: 0;
    }
    .archive-date-input {
      flex: 1; background: var(--bg-input);
      border: 1px solid var(--border-lt); border-radius: 8px;
      color: var(--gold-lt); font-size: 17px; font-weight: 700;
      padding: 10px 12px; font-family: inherit;
      outline: none; transition: border-color 0.2s;
    }
    .archive-date-input:focus { border-color: var(--gold); }

    .archive-memo-label {
      font-size: 16px; font-weight: 700; color: var(--text-dim);
      margin-bottom: 8px;
    }
    .archive-memo {
      width: 100%; background: var(--bg-input);
      border: 1px solid var(--border-lt); border-radius: 10px;
      color: var(--text); font-size: 18px; font-weight: 600;
      padding: 14px; font-family: inherit;
      outline: none; resize: vertical; min-height: 90px;
      transition: border-color 0.2s; line-height: 1.5;
    }
    .archive-memo::placeholder { color: var(--text-dim); font-weight: 400; }
    .archive-memo:focus { border-color: var(--grad-clr); }

    .archive-actions {
      display: flex; gap: 10px; margin-top: 12px; align-items: center;
    }
    .btn-memo-save {
      flex: 1; background: var(--grad-dim);
      border: 1px solid var(--grad-bdr); border-radius: 10px;
      color: var(--grad-clr); font-size: 18px; font-weight: 800;
      padding: 14px; cursor: pointer; transition: all 0.2s;
      letter-spacing: 1px;
    }
    .btn-memo-save:active {
      background: rgba(94,192,128,0.3); border-color: var(--grad-clr);
    }
    .btn-archive-del {
      background: none; border: 1px solid var(--border-lt);
      border-radius: 10px; color: var(--text-dim);
      font-size: 18px; font-weight: 700; padding: 14px 18px;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-archive-del:active { color: var(--danger); border-color: var(--danger); background: rgba(192,53,53,0.1); }

    /* ─── TOAST ─── */
    .toast {
      position: fixed;
      bottom: calc(28px + env(safe-area-inset-bottom, 0px)); left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--gold); color: #000000;
      padding: 14px 28px; border-radius: 28px;
      font-size: 19px; font-weight: 800; letter-spacing: 1px;
      z-index: 999;
      transition: transform 0.3s cubic-bezier(.175,.885,.32,1.275);
      white-space: nowrap; pointer-events: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.7);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ─── GRADUATION MODAL ─── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.85); z-index: 500;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--bg-card); border: 1px solid var(--grad-bdr);
      border-radius: 20px; padding: 28px 24px; width: 100%;
      max-width: 480px; box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    }
    .modal-title {
      font-size: 26px; font-weight: 800; color: var(--grad-clr);
      text-align: center; margin-bottom: 8px;
    }
    .modal-song {
      font-size: 22px; font-weight: 700; color: var(--gold-lt);
      text-align: center; margin-bottom: 24px;
      padding: 10px 16px; background: var(--gold-dim);
      border-radius: 10px; word-break: break-all;
    }
    .modal-label {
      font-size: 17px; font-weight: 700; color: var(--text-dim);
      margin-bottom: 8px; margin-top: 16px;
    }
    .modal-input {
      width: 100%; background: var(--bg-input);
      border: 1px solid var(--border-lt); border-radius: 10px;
      color: var(--gold-lt); font-size: 19px; font-weight: 700;
      padding: 14px; font-family: inherit;
      outline: none; transition: border-color 0.2s;
    }
    .modal-input:focus { border-color: var(--grad-clr); }
    .modal-textarea {
      width: 100%; background: var(--bg-input);
      border: 1px solid var(--border-lt); border-radius: 10px;
      color: var(--text); font-size: 19px; font-weight: 600;
      padding: 14px; font-family: inherit;
      outline: none; resize: vertical; min-height: 100px;
      transition: border-color 0.2s; line-height: 1.5;
    }
    .modal-textarea::placeholder { color: var(--text-dim); font-weight: 400; }
    .modal-textarea:focus { border-color: var(--grad-clr); }
    .modal-btns { display: flex; gap: 10px; margin-top: 24px; }
    .btn-modal-ok {
      flex: 2;
      background: linear-gradient(135deg, #3a9055 0%, #5ec080 50%, #3a9055 100%);
      border: none; border-radius: 12px;
      color: #000; font-size: 20px; font-weight: 800;
      padding: 18px; cursor: pointer; transition: all 0.2s;
      letter-spacing: 1px;
    }
    .btn-modal-ok:active { transform: scale(0.97); }
    .btn-modal-cancel {
      flex: 1; background: none;
      border: 1px solid var(--border-lt); border-radius: 12px;
      color: var(--text-dim); font-size: 20px; font-weight: 700;
      padding: 18px; cursor: pointer; transition: all 0.2s;
    }
    .btn-modal-cancel:active { background: var(--bg-card2); }

    /* ─── SCROLLBAR ─── */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border-lt); border-radius: 2px; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 390px) {
      .timer-time       { font-size: 60px; }
      .btn-start        { height: 76px; font-size: 21px; }
      .timer-song-label { font-size: 21px; }
      .song-name        { font-size: 19px; }
      .stat-song        { font-size: 19px; }
      .stat-mins        { font-size: 30px; }
      .btn-grad         { font-size: 12px; padding: 7px 8px; }
    }
    @media (max-width: 340px) {
      .timer-time       { font-size: 52px; }
      .btn-start        { height: 70px; font-size: 19px; }
      .song-name        { font-size: 17px; }
    }
  </style>
</head>

<script>
/* =====================================================
   DATA LAYER
===================================================== */
const SONGS_KEY    = 'piano_songs_v1';
const SESSIONS_KEY = 'piano_sessions_v1';
const ARCHIVE_KEY  = 'piano_archive_v1';

const db = {
  getSongs:    () => JSON.parse(localStorage.getItem(SONGS_KEY)    || '[]'),
  getSessions: () => JSON.parse(localStorage.getItem(SESSIONS_KEY) || '[]'),
  getArchive:  () => JSON.parse(localStorage.getItem(ARCHIVE_KEY)  || '[]'),
  saveSongs(s)    { localStorage.setItem(SONGS_KEY,    JSON.stringify(s)); },
  saveSessions(s) { localStorage.setItem(SESSIONS_KEY, JSON.stringify(s)); },
  saveArchive(a)  { localStorage.setItem(ARCHIVE_KEY,  JSON.stringify(a)); },
  addSession(songName, totalSeconds) {
    const mins = Math.ceil(totalSeconds / 60);
    if (mins < 1) return false;
    const sessions = this.getSessions();
    sessions.push({ id: Date.now(), songName, date: todayStr(), duration: mins });
    this.saveSessions(sessions);
    return mins;
  }
};

/* =====================================================
   HELPERS
===================================================== */
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function pad(n) { return String(n).padStart(2,'0'); }

function daysAgo(n) {
  const d = new Date();
  d.setDate(d.getDate() - n);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function getWeekStart() {
  const d = new Date();
  const diff = (d.getDay() === 0) ? 6 : d.getDay() - 1;
  d.setDate(d.getDate() - diff);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function getMonthStart() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-01`;
}
function formatDateJP(str) {
  if (!str) return '';
  const [y, m, d] = str.split('-');
  return `${y}年${parseInt(m)}月${parseInt(d)}日`;
}
function totalMinsForSong(songName) {
  return db.getSessions()
    .filter(s => s.songName === songName)
    .reduce((sum, s) => sum + s.duration, 0);
}
function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* =====================================================
   TOAST
===================================================== */
let toastTid;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTid);
  toastTid = setTimeout(() => t.classList.remove('show'), 2800);
}

/* =====================================================
   STATE
===================================================== */
let selectedSong  = null;
let timerRunning  = false;
let timerStartAt  = 0;
let timerTick     = null;
let currentTab    = 'today';
let chartInstance = null;
let pendingGradSong = null; // 練習終了待ちの曲名

/* =====================================================
   SONG LIST
===================================================== */
function renderSongs() {
  const songs = db.getSongs();
  const el    = document.getElementById('songList');
  if (songs.length === 0) {
    el.innerHTML = '<p class="empty-msg">曲を追加してください</p>';
    return;
  }
  el.innerHTML = songs.map((name, i) => `
    <div class="song-item${selectedSong === name ? ' selected' : ''}"
         data-idx="${i}" role="button" tabindex="0">
      <div class="radio-dot"></div>
      <span class="song-name">${esc(name)}</span>
      <button class="btn-grad" data-grad="${i}" title="練習終了にする">🎓&nbsp;終了</button>
      <button class="btn-del"  data-del="${i}"  aria-label="削除">✕</button>
    </div>
  `).join('');
}

function addSong() {
  const input = document.getElementById('songInput');
  const name  = input.value.trim();
  if (!name) { input.focus(); return; }
  const songs = db.getSongs();
  if (songs.includes(name)) { showToast('同じ曲名が既にあります'); return; }
  songs.push(name);
  db.saveSongs(songs);
  input.value = '';
  renderSongs();
  showToast(`「${name}」を追加しました`);
}

function deleteSong(idx) {
  const songs = db.getSongs();
  const name  = songs[idx];
  if (!name) return;
  if (timerRunning && selectedSong === name) {
    showToast('練習中の曲は削除できません'); return;
  }
  if (selectedSong === name) { selectedSong = null; updateTimerControls(); }
  songs.splice(idx, 1);
  db.saveSongs(songs);
  renderSongs(); renderStats();
  showToast(`「${name}」を削除しました`);
}

function selectSong(idx) {
  if (timerRunning) return;
  const songs = db.getSongs();
  const name  = songs[idx];
  if (!name) return;
  selectedSong = (selectedSong === name) ? null : name;
  renderSongs(); updateTimerControls();
}

// 練習終了ボタン → モーダルを開く
function openGradModal(idx) {
  const songs = db.getSongs();
  const name  = songs[idx];
  if (!name) return;
  if (timerRunning && selectedSong === name) {
    showToast('練習中の曲は終了できません'); return;
  }
  pendingGradSong = name;
  document.getElementById('modalSongName').textContent = name;
  document.getElementById('modalDate').value  = todayStr();
  document.getElementById('modalMemo').value  = '';
  document.getElementById('gradModal').classList.add('show');
  setTimeout(() => document.getElementById('modalDate').focus(), 100);
}

function closeGradModal() {
  document.getElementById('gradModal').classList.remove('show');
  pendingGradSong = null;
}

function confirmGrad() {
  if (!pendingGradSong) return;
  const date = document.getElementById('modalDate').value || todayStr();
  const memo = document.getElementById('modalMemo').value.trim();

  // アーカイブに追加
  const archive = db.getArchive();
  archive.unshift({
    id:           Date.now(),
    name:         pendingGradSong,
    archivedDate: date,
    memo:         memo
  });
  db.saveArchive(archive);

  // アクティブ曲リストから削除
  const songs = db.getSongs().filter(n => n !== pendingGradSong);
  if (selectedSong === pendingGradSong) { selectedSong = null; updateTimerControls(); }
  db.saveSongs(songs);

  closeGradModal();
  renderSongs(); renderStats(); renderArchive();
  showToast(`「${pendingGradSong}」を練習終了しました 🎓`);
}

// イベント委任
document.getElementById('songList').addEventListener('click', e => {
  const gradBtn = e.target.closest('.btn-grad');
  const delBtn  = e.target.closest('.btn-del');
  const item    = e.target.closest('.song-item');
  if (gradBtn) {
    e.stopPropagation();
    openGradModal(parseInt(gradBtn.dataset.grad, 10));
  } else if (delBtn) {
    e.stopPropagation();
    deleteSong(parseInt(delBtn.dataset.del, 10));
  } else if (item) {
    selectSong(parseInt(item.dataset.idx, 10));
  }
});

document.getElementById('btnAdd').addEventListener('click', addSong);
document.getElementById('songInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addSong();
});
document.getElementById('btnModalOk').addEventListener('click', confirmGrad);
document.getElementById('btnModalCancel').addEventListener('click', closeGradModal);
document.getElementById('gradModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeGradModal();
});

/* =====================================================
   TIMER
===================================================== */
function updateTimerControls() {
  const btn     = document.getElementById('btnStart');
  const label   = document.getElementById('btnLabel');
  const ring    = document.getElementById('timerRing');
  const songLbl = document.getElementById('timerSongLabel');
  const display = document.getElementById('timerDisplay');

  btn.disabled = (!timerRunning && !selectedSong);
  if (timerRunning) {
    btn.classList.add('running');
    label.textContent  = '練習を終了する';
    ring.style.display = 'inline-block';
    display.classList.add('running');
    songLbl.textContent = selectedSong || '';
  } else {
    btn.classList.remove('running');
    label.textContent  = '練習を開始する';
    ring.style.display = 'none';
    display.classList.remove('running');
    songLbl.textContent = selectedSong ? `— ${selectedSong} —` : '';
  }
}

function formatTime(sec) {
  return `${pad(Math.floor(sec/3600))}:${pad(Math.floor((sec%3600)/60))}:${pad(sec%60)}`;
}

function startTimer() {
  if (!selectedSong) return;
  timerStartAt = Date.now(); timerRunning = true;
  timerTick = setInterval(() => {
    const e = Math.floor((Date.now() - timerStartAt) / 1000);
    document.getElementById('timerDisplay').textContent = formatTime(e);
  }, 500);
  updateTimerControls(); requestWakeLock();
}

function stopTimer() {
  clearInterval(timerTick); timerRunning = false;
  const elapsed = Math.floor((Date.now() - timerStartAt) / 1000);
  const mins    = db.addSession(selectedSong, elapsed);
  document.getElementById('timerDisplay').textContent = '00:00:00';
  releaseWakeLock();
  if (mins) {
    showToast(`${mins}分を記録しました！`);
    renderStats(); renderChart();
  } else {
    showToast('30秒未満は記録されません');
  }
  updateTimerControls();
}

document.getElementById('btnStart').addEventListener('click', () => {
  if (timerRunning) stopTimer(); else startTimer();
});

let wakeLock = null;
async function requestWakeLock() {
  try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch(_) {}
}
function releaseWakeLock() { wakeLock?.release().catch(()=>{}); wakeLock = null; }
document.addEventListener('visibilitychange', async () => {
  if (timerRunning && document.visibilityState === 'visible') requestWakeLock();
});

/* =====================================================
   STATISTICS
===================================================== */
function getRange(tab) {
  const today = todayStr();
  if (tab === 'today') return [today, today];
  if (tab === 'week')  return [getWeekStart(), today];
  if (tab === 'month') return [getMonthStart(), today];
}

function renderStats() {
  const [start, end] = getRange(currentTab);
  const sessions     = db.getSessions();
  const songs        = db.getSongs();
  const totals = {};
  sessions.forEach(s => {
    if (s.date >= start && s.date <= end)
      totals[s.songName] = (totals[s.songName] || 0) + s.duration;
  });
  const extra  = Object.keys(totals).filter(n => !songs.includes(n));
  const active = [...songs, ...extra].filter(n => totals[n]);
  const list   = document.getElementById('statsList');
  const totEl  = document.getElementById('statsTotal');
  const totV   = document.getElementById('statsTotalVal');
  if (active.length === 0) {
    list.innerHTML = '<p class="empty-msg">この期間の練習記録はありません</p>';
    totEl.style.display = 'none'; return;
  }
  const rows = active.map(n => ({name:n, mins:totals[n]})).sort((a,b) => b.mins - a.mins);
  list.innerHTML = rows.map(r => `
    <div class="stat-row">
      <span class="stat-song">${esc(r.name)}</span>
      <span class="stat-mins">${r.mins}<span class="stat-unit">分</span></span>
    </div>
  `).join('');
  totV.textContent = rows.reduce((s,r) => s + r.mins, 0);
  totEl.style.display = 'flex';
}

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    currentTab = btn.dataset.tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderStats();
  });
});

/* =====================================================
   ARCHIVE
===================================================== */
function renderArchive() {
  const archive = db.getArchive();
  const card    = document.getElementById('archiveCard');
  const list    = document.getElementById('archiveList');
  const count   = document.getElementById('archiveCount');

  if (archive.length === 0) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  count.textContent  = archive.length;

  list.innerHTML = archive.map(item => {
    const total = totalMinsForSong(item.name);
    return `
    <div class="archive-card" data-aid="${item.id}">
      <div class="archive-card-header">
        <span class="archive-icon">🎓</span>
        <span class="archive-name">${esc(item.name)}</span>
        ${total > 0 ? `<span class="archive-stats-badge">累計 ${total}分</span>` : ''}
      </div>
      <div class="archive-body">
        <div class="archive-date-row">
          <span class="archive-date-label">終了日</span>
          <input type="date" class="archive-date-input"
                 value="${esc(item.archivedDate)}"
                 data-aid="${item.id}" data-field="date">
        </div>
        <div class="archive-memo-label">感想・メモ</div>
        <textarea class="archive-memo" rows="3"
                  placeholder="感想や思い出を入力…"
                  data-aid="${item.id}" data-field="memo">${esc(item.memo || '')}</textarea>
        <div class="archive-actions">
          <button class="btn-memo-save" data-aid="${item.id}">保存する</button>
          <button class="btn-archive-del" data-adel="${item.id}">削除</button>
        </div>
      </div>
    </div>
  `}).join('');
}

// アーカイブの保存・削除イベント
document.getElementById('archiveList').addEventListener('click', e => {
  const saveBtn = e.target.closest('.btn-memo-save');
  const delBtn  = e.target.closest('.btn-archive-del');
  if (saveBtn) {
    const id   = parseInt(saveBtn.dataset.aid, 10);
    const card = saveBtn.closest('.archive-card');
    const dateInput = card.querySelector('[data-field="date"]');
    const memoInput = card.querySelector('[data-field="memo"]');
    const archive   = db.getArchive();
    const item      = archive.find(a => a.id === id);
    if (item) {
      item.archivedDate = dateInput.value;
      item.memo         = memoInput.value.trim();
      db.saveArchive(archive);
      showToast('メモを保存しました ✓');
    }
  } else if (delBtn) {
    const id      = parseInt(delBtn.dataset.adel, 10);
    const archive = db.getArchive().filter(a => a.id !== id);
    db.saveArchive(archive);
    renderArchive();
    showToast('アーカイブから削除しました');
  }
});

/* =====================================================
   CHART  ─  色永続化 + 積み上げ棒 + カスタム凡例
===================================================== */

// シックな12色パレット（背景色・枠色のペア）
const PALETTE = [
  { bg:'rgba(212,174, 82,0.88)', bd:'#d4ae52' },  // ゴールド
  { bg:'rgba( 94,156,220,0.88)', bd:'#5e9cdc' },  // ブルー
  { bg:'rgba(220, 94, 94,0.88)', bd:'#dc5e5e' },  // レッド
  { bg:'rgba( 94,200,140,0.88)', bd:'#5ec88c' },  // グリーン
  { bg:'rgba(210,130, 55,0.88)', bd:'#d28237' },  // オレンジ
  { bg:'rgba(165,110,210,0.88)', bd:'#a56ed2' },  // パープル
  { bg:'rgba( 70,190,190,0.88)', bd:'#46bebe' },  // ティール
  { bg:'rgba(220,170, 90,0.88)', bd:'#dcaa5a' },  // アンバー
  { bg:'rgba(130,190, 75,0.88)', bd:'#82be4b' },  // ライム
  { bg:'rgba(210, 85,160,0.88)', bd:'#d255a0' },  // ピンク
  { bg:'rgba(100,155,210,0.88)', bd:'#649bd2' },  // インディゴ
  { bg:'rgba(185,185, 75,0.88)', bd:'#b9b94b' },  // イエロー
];

// 曲ごとの色インデックスをlocalStorageに永続保存
const COLORS_KEY = 'piano_song_colors_v1';
function getColorMap()    { return JSON.parse(localStorage.getItem(COLORS_KEY) || '{}'); }
function saveColorMap(m)  { localStorage.setItem(COLORS_KEY, JSON.stringify(m)); }

function getOrAssignColor(songName) {
  const map  = getColorMap();
  if (map[songName] !== undefined) return map[songName];
  // 未使用インデックスを探す
  const used = new Set(Object.values(map));
  let idx = 0;
  while (used.has(idx)) idx++;
  map[songName] = idx;
  saveColorMap(map);
  return idx;
}

function last7Days() { return Array.from({length:7}, (_,i) => daysAgo(6-i)); }
function dayLabel(d) {
  const dt   = new Date(d + 'T12:00:00');
  const days = ['日','月','火','水','木','金','土'];
  return `${dt.getMonth()+1}/${dt.getDate()}(${days[dt.getDay()]})`;
}

function renderChart() {
  const days    = last7Days();
  const sessions = db.getSessions();
  const active  = db.getSongs();
  const archived = db.getArchive().map(a => a.name);

  // 直近7日のセッション（練習終了済みを含む全曲）
  const inRange = sessions.filter(s => days.includes(s.date));
  const seenInRange = [...new Set(inRange.map(s => s.songName))];

  // 表示順：アクティブ曲 → アーカイブ曲 → その他
  const ordered = [
    ...active.filter(n => seenInRange.includes(n)),
    ...archived.filter(n => seenInRange.includes(n) && !active.includes(n)),
    ...seenInRange.filter(n => !active.includes(n) && !archived.includes(n)),
  ];

  const canvas = document.getElementById('practiceChart');
  const legend = document.getElementById('chartLegend');
  const ctx    = canvas.getContext('2d');
  if (chartInstance) chartInstance.destroy();

  if (ordered.length === 0) {
    canvas.style.display = 'none';
    legend.innerHTML = '<p class="chart-no-data">まだ練習記録がありません</p>';
    return;
  }
  canvas.style.display = '';

  const labels   = days.map(dayLabel);
  const datasets = ordered.map(song => {
    const idx   = getOrAssignColor(song);
    const color = PALETTE[idx % PALETTE.length];
    return {
      label: song,
      data: days.map(d =>
        inRange.filter(s => s.songName === song && s.date === d)
               .reduce((sum, s) => sum + s.duration, 0)
      ),
      backgroundColor: color.bg,
      borderColor:     color.bd,
      borderWidth: 0,
      borderRadius: 4,
      borderSkipped: false,
    };
  });

  chartInstance = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },   // ← Chart.js標準凡例は非表示、自前で描画
        tooltip: {
          backgroundColor: '#1a1a1a',
          borderColor: '#3a3a3a', borderWidth: 1,
          titleColor: '#f5f2e8',  bodyColor: '#f0d080',
          titleFont: { size:14, weight:'700' },
          bodyFont:  { size:14, weight:'600' },
          padding: 12,
          callbacks: {
            title: items => items[0].label,
            label: item  => ` ${item.dataset.label}：${item.parsed.y}分`,
          }
        }
      },
      scales: {
        x: {
          stacked: true,
          grid:   { color:'rgba(255,255,255,0.05)' },
          border: { color:'rgba(255,255,255,0.1)'  },
          ticks:  { color:'#c0bdb0', font:{size:12,family:'-apple-system,sans-serif',weight:'700'}, maxRotation:0 }
        },
        y: {
          stacked: true, beginAtZero: true,
          grid:   { color:'rgba(255,255,255,0.05)' },
          border: { color:'rgba(255,255,255,0.1)'  },
          ticks:  {
            color:'#c0bdb0',
            font: { size:12, family:'-apple-system,sans-serif', weight:'700' },
            stepSize: 10,
            callback: v => v + '分'
          }
        }
      }
    }
  });

  // ── カスタム凡例を描画 ──
  const archivedSet = new Set(archived);
  legend.innerHTML = ordered.map(song => {
    const idx    = getOrAssignColor(song);
    const color  = PALETTE[idx % PALETTE.length];
    const total7 = inRange.filter(s => s.songName === song)
                          .reduce((sum, s) => sum + s.duration, 0);
    const isArc  = archivedSet.has(song);
    return `
      <div class="legend-item">
        <div class="legend-swatch" style="background:${color.bg};border:1.5px solid ${color.bd};"></div>
        <div class="legend-label-wrap">
          <span class="legend-name">${esc(song)}</span>
          ${isArc ? '<span class="legend-archived">🎓</span>' : ''}
          ${total7 > 0 ? `<span class="legend-mins">${total7}分</span>` : ''}
        </div>
      </div>`;
  }).join('');
}
