<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ピアノ練習">
  <meta name="theme-color" content="#0a0a0a">
  <title>ピアノ練習記録</title>
  <style>
    :root {
      --bg:       #080808;
      --bg-card:  #141414;
      --bg-card2: #1e1e1e;
      --bg-input: #111111;
      --gold:     #d4ae52;
      --gold-lt:  #f0d080;
      --gold-dim: rgba(212,174,82,0.18);
      --text:     #f5f2e8;
      --text-dim: #8a877c;
      --border:   #2a2a2a;
      --bdr-lt:   #3a3a3a;
      --danger:   #c03535;
      --grn:      #5ec080;
      --grn-dim:  rgba(94,192,128,0.15);
      --grn-bdr:  rgba(94,192,128,0.45);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
      font-weight: 500; min-height: 100vh; overflow-x: hidden;
      padding-bottom: env(safe-area-inset-bottom, 24px);
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(180deg, #1a1a18 0%, #0a0a0a 100%);
      border-bottom: 1px solid #2a2a20;
      padding: 20px 16px 0; text-align: center;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 4px 24px rgba(0,0,0,0.8);
    }
    .header h1 { font-size: 32px; font-weight: 800; letter-spacing: 6px; color: var(--gold-lt); text-transform: uppercase; font-family: 'Georgia', serif; }
    .header p  { font-size: 16px; color: var(--text-dim); letter-spacing: 3px; margin: 6px 0 0; font-weight: 600; text-transform: uppercase; }
    .piano-svg { display: block; width: 100%; max-width: 420px; margin: 12px auto 0; }

    /* ── LAYOUT ── */
    .container { max-width: 580px; margin: 0 auto; padding: 16px 14px; display: flex; flex-direction: column; gap: 14px; }

    /* ── CARD ── */
    .card { background: var(--bg-card); border: 1px solid var(--bdr-lt); border-radius: 16px; padding: 20px 18px; }
    .card-title { font-size: 16px; font-weight: 700; letter-spacing: 3px; color: var(--gold-lt); text-transform: uppercase; margin-bottom: 18px; }

    /* ── 曲追加行 ── */
    .add-row { display: flex; gap: 8px; margin-bottom: 14px; }
    .song-input {
      flex: 1; background: var(--bg-input); border: 1px solid var(--bdr-lt); border-radius: 10px;
      color: #fff; font-size: 22px; font-weight: 600; padding: 16px; font-family: inherit;
      outline: none; transition: border-color 0.2s; min-width: 0;
    }
    .song-input::placeholder { color: var(--text-dim); font-weight: 400; }
    .song-input:focus { border-color: var(--gold); }
    .btn-add { background: var(--gold); border: none; border-radius: 10px; color: #000; font-size: 34px; font-weight: 800; width: 62px; flex-shrink: 0; cursor: pointer; transition: background 0.15s; }
    .btn-add:active { background: var(--gold-lt); }

    /* ── 曲リスト ── */
    .song-list { display: flex; flex-direction: column; gap: 12px; }

    /* ── 曲カード ── */
    .song-card {
      background: var(--bg-card2); border: 2px solid var(--border);
      border-radius: 14px; overflow: hidden; transition: border-color 0.25s;
    }
    .song-card.running { border-color: var(--danger); }
    .song-card.paused  { border-color: var(--gold); }

    /* 曲名行 */
    .song-name-row {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 14px 12px; background: rgba(0,0,0,0.25);
      border-bottom: 1px solid var(--border);
    }
    .song-name { flex: 1; font-size: 22px; font-weight: 800; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .song-card.running .song-name { color: var(--gold-lt); }
    .song-card.paused  .song-name { color: var(--gold); }

    /* バッジ */
    .song-meta { display: flex; gap: 8px; align-items: center; padding: 8px 14px 0; flex-wrap: wrap; min-height: 36px; }
    .song-meta-badge { font-size: 13px; font-weight: 700; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
    .badge-total { background: var(--gold-dim); border: 1px solid rgba(212,174,82,0.3); color: var(--gold-lt); }
    .badge-last  { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-dim); }
    .badge-new   { background: var(--grn-dim); border: 1px solid var(--grn-bdr); color: var(--grn); }

    /* 削除ボタン */
    .btn-del { background: none; border: none; color: var(--text-dim); font-size: 22px; padding: 6px 8px; cursor: pointer; flex-shrink: 0; border-radius: 8px; transition: all 0.15s; }
    .btn-del:active { color: var(--danger); background: rgba(192,53,53,0.12); }

    /* ── タイマーエリア ── */
    .song-timer-area { padding: 14px 16px 16px; text-align: center; }

    .song-timer-display {
      font-size: 58px; font-weight: 800; color: #444;
      font-variant-numeric: tabular-nums; letter-spacing: 3px;
      line-height: 1; margin-bottom: 16px;
      font-family: -apple-system, 'SF Mono', monospace;
      transition: color 0.3s, text-shadow 0.3s;
    }
    .song-card.running .song-timer-display {
      color: var(--gold-lt);
      text-shadow: 0 0 40px rgba(212,174,82,0.45), 0 0 14px rgba(212,174,82,0.25);
    }
    .song-card.paused .song-timer-display { color: var(--gold); }

    /* ── タイマーボタン群 ── */
    .timer-btns { display: flex; gap: 10px; }

    .btn-start {
      flex: 1; height: 76px;
      background: linear-gradient(135deg, #b08828 0%, #d4ae52 40%, #e0c060 60%, #b08828 100%);
      border: none; border-radius: 12px; color: #000;
      font-size: 22px; font-weight: 800; letter-spacing: 1px;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 4px 18px rgba(212,174,82,0.22);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-start:active { transform: scale(0.97); }
    .btn-start:disabled {
      background: var(--bg-input); color: var(--text-dim);
      box-shadow: none; cursor: not-allowed; border: 1px solid var(--border);
    }

    .btn-pause {
      flex: 1; height: 76px;
      background: linear-gradient(135deg, #7a5500 0%, #c08020 40%, #d4943a 60%, #7a5500 100%);
      border: none; border-radius: 12px; color: #000;
      font-size: 20px; font-weight: 800; letter-spacing: 1px;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 4px 18px rgba(192,128,32,0.25);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-pause:active { transform: scale(0.97); }

    .btn-resume {
      flex: 1; height: 76px;
      background: linear-gradient(135deg, #1a6030 0%, #3a9055 40%, #4aaa65 60%, #1a6030 100%);
      border: none; border-radius: 12px; color: #fff;
      font-size: 20px; font-weight: 800; letter-spacing: 1px;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 4px 18px rgba(60,144,80,0.28);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-resume:active { transform: scale(0.97); }

    .btn-end {
      flex: 1; height: 76px;
      background: linear-gradient(135deg, #7a1818 0%, #c03535 40%, #d84040 60%, #7a1818 100%);
      border: none; border-radius: 12px; color: #fff;
      font-size: 18px; font-weight: 800;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 4px 18px rgba(192,53,53,0.3);
      display: flex; align-items: center; justify-content: center; gap: 6px; line-height: 1.3; text-align: center;
    }
    .btn-end:active { transform: scale(0.97); }

    .empty-msg { text-align: center; color: var(--text-dim); font-size: 18px; font-weight: 500; padding: 20px 0 8px; }

    /* ── STATS ── */
    .tabs { display: flex; background: var(--bg-input); border-radius: 12px; padding: 5px; gap: 5px; margin-bottom: 16px; }
    .tab { flex: 1; background: none; border: none; color: var(--text-dim); font-size: 20px; font-weight: 700; padding: 14px 6px; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
    .tab.active { background: var(--bg-card2); color: var(--gold-lt); border: 1px solid var(--bdr-lt); }
    .stats-list { display: flex; flex-direction: column; gap: 8px; }
    .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 18px 16px; background: var(--bg-card2); border: 1px solid var(--border); border-radius: 12px; min-height: 72px; }
    .stat-song { font-size: 22px; font-weight: 700; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; padding-right: 12px; }
    .stat-mins { font-size: 36px; font-weight: 700; color: var(--gold-lt); font-variant-numeric: tabular-nums; white-space: nowrap; flex-shrink: 0; }
    .stat-unit { font-size: 18px; font-weight: 600; color: var(--text-dim); margin-left: 4px; }
    .stats-total { display: flex; justify-content: flex-end; align-items: baseline; gap: 6px; padding: 14px 4px 0; border-top: 1px solid var(--border); margin-top: 12px; }
    .stats-total-label { font-size: 18px; font-weight: 600; color: var(--text-dim); }
    .stats-total-val   { font-size: 30px; font-weight: 800; color: var(--gold-lt); font-variant-numeric: tabular-nums; }

    /* ── TOAST ── */
    .toast { position: fixed; bottom: calc(28px + env(safe-area-inset-bottom,0px)); left: 50%; transform: translateX(-50%) translateY(80px); background: var(--gold); color: #000; padding: 14px 28px; border-radius: 28px; font-size: 19px; font-weight: 800; letter-spacing: 1px; z-index: 999; transition: transform 0.3s cubic-bezier(.175,.885,.32,1.275); white-space: nowrap; pointer-events: none; box-shadow: 0 8px 32px rgba(0,0,0,0.7); }
    .toast.show { transform: translateX(-50%) translateY(0); }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--bdr-lt); border-radius: 2px; }

    @media (max-width: 390px) {
      .song-timer-display { font-size: 48px; }
      .btn-start, .btn-pause, .btn-resume { font-size: 18px; }
      .btn-end  { font-size: 15px; }
      .song-name { font-size: 19px; }
      .stat-song { font-size: 19px; }
      .stat-mins { font-size: 30px; }
    }
    @media (max-width: 340px) {
      .song-timer-display { font-size: 40px; }
      .song-name { font-size: 17px; }
      .btn-start, .btn-pause, .btn-resume, .btn-end { font-size: 14px; height: 62px; }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- ① 練習曲リスト（入力 + 永続カード） -->
  <div class="card">
    <div class="card-title">♩ 練習曲リスト</div>
    <div class="add-row">
      <input type="text" id="songInput" class="song-input"
             placeholder="新しい曲名を入力..." maxlength="60"
             autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="btn-add" id="btnAdd" aria-label="曲を追加">＋</button>
    </div>
    <div class="song-list" id="songList">
      <p class="empty-msg">曲を追加してください</p>
    </div>
  </div>

  <!-- ② 練習時間の集計 -->
  <div class="card">
    <div class="card-title">♩ 練習時間</div>
    <div class="tabs">
      <button class="tab active" data-tab="today">今日</button>
      <button class="tab"        data-tab="week" >今週</button>
      <button class="tab"        data-tab="month">今月</button>
    </div>
    <div class="stats-list" id="statsList"></div>
    <div class="stats-total" id="statsTotal" style="display:none">
      <span class="stats-total-label">合計</span>
      <span class="stats-total-val" id="statsTotalVal">0</span>
      <span class="stats-total-label">分</span>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
/* =====================================================
   DATA LAYER
===================================================== */
const SONGS_KEY    = 'piano_songs_v1';
const SESSIONS_KEY = 'piano_sessions_v1';

const db = {
  getSongs:    () => JSON.parse(localStorage.getItem(SONGS_KEY)    || '[]'),
  getSessions: () => JSON.parse(localStorage.getItem(SESSIONS_KEY) || '[]'),
  saveSongs(s)    { localStorage.setItem(SONGS_KEY,    JSON.stringify(s)); },
  saveSessions(s) { localStorage.setItem(SESSIONS_KEY, JSON.stringify(s)); },
  addSession(songName, totalSeconds) {
    const mins = Math.ceil(totalSeconds / 60);
    if (mins < 1) return false;
    const s = this.getSessions();
    s.push({ id: Date.now(), songName, date: todayStr(), duration: mins });
    this.saveSessions(s); return mins;
  }
};

/* =====================================================
   HELPERS
===================================================== */
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function pad(n) { return String(n).padStart(2,'0'); }
function getWeekStart() {
  const d=new Date(), diff=d.getDay()===0?6:d.getDay()-1;
  d.setDate(d.getDate()-diff);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function getMonthStart() { const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-01`; }
function formatTime(sec) {
  sec = Math.max(0, Math.floor(sec));
  return `${pad(Math.floor(sec/3600))}:${pad(Math.floor((sec%3600)/60))}:${pad(sec%60)}`;
}
function esc(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function totalMinsForSong(n) { return db.getSessions().filter(s=>s.songName===n).reduce((t,s)=>t+s.duration,0); }

function lastPracticeLabel(name) {
  const sessions = db.getSessions().filter(s => s.songName === name);
  if (!sessions.length) return null;
  const last  = sessions.map(s=>s.date).sort().pop();
  const today = todayStr();
  if (last === today) return 'today';
  const diffD = Math.round((new Date(today+'T12:00:00') - new Date(last+'T12:00:00')) / 86400000);
  return diffD === 1 ? '昨日' : `${diffD}日前`;
}

/* =====================================================
   TOAST
===================================================== */
let toastTid;
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTid);
  toastTid=setTimeout(()=>t.classList.remove('show'),2800);
}

/* =====================================================
   STOPWATCH STATE
   state: 'idle' | 'running' | 'paused'
===================================================== */
let swState   = 'idle';
let swSong    = null;
let swIdx     = -1;
let swAccum   = 0;
let swStartAt = 0;
let swTick    = null;

function getElapsed() {
  if (swState === 'idle')   return 0;
  if (swState === 'paused') return swAccum;
  return swAccum + Math.floor((Date.now() - swStartAt) / 1000);
}

/* =====================================================
   SONG CARD RENDER
===================================================== */
function buildBadges(name) {
  const total = totalMinsForSong(name);
  const lbl   = lastPracticeLabel(name);
  let html = '';
  if (total > 0) html += `<span class="song-meta-badge badge-total">累計 ${total}分</span>`;
  if (lbl === 'today') html += `<span class="song-meta-badge badge-new">✓ 今日練習済み</span>`;
  else if (lbl)        html += `<span class="song-meta-badge badge-last">最終: ${lbl}</span>`;
  return html;
}

function buildTimerBtns(name, i) {
  const isMine    = name === swSong;
  const isRunning = isMine && swState === 'running';
  const isPaused  = isMine && swState === 'paused';
  const otherBusy = !isMine && swState !== 'idle';

  if (isRunning) return `
    <button class="btn-pause" data-idx="${i}">⏸ 一時停止</button>
    <button class="btn-end"   data-idx="${i}">⏹ 終了して記録</button>`;
  if (isPaused) return `
    <button class="btn-resume" data-idx="${i}">▶ 再開する</button>
    <button class="btn-end"    data-idx="${i}">⏹ 終了して記録</button>`;
  return `<button class="btn-start" data-idx="${i}" ${otherBusy?'disabled':''}>▶ 練習を開始する</button>`;
}

function renderSongs() {
  const songs = db.getSongs();
  const el    = document.getElementById('songList');
  if (!songs.length) { el.innerHTML='<p class="empty-msg">曲を追加してください</p>'; return; }

  el.innerHTML = songs.map((name, i) => {
    const isMine    = name === swSong;
    const isRunning = isMine && swState === 'running';
    const isPaused  = isMine && swState === 'paused';
    const dispTime  = isMine ? formatTime(getElapsed()) : '00:00:00';
    const cardCls   = isRunning ? 'running' : isPaused ? 'paused' : '';
    return `
    <div class="song-card ${cardCls}" id="song-card-${i}">
      <div class="song-name-row">
        <span class="song-name">${esc(name)}</span>
        <button class="btn-del" data-del="${i}" aria-label="削除">✕</button>
      </div>
      <div class="song-meta" id="song-meta-${i}">${buildBadges(name)}</div>
      <div class="song-timer-area">
        <div class="song-timer-display" id="timer-disp-${i}">${dispTime}</div>
        <div class="timer-btns" id="timer-btns-${i}">${buildTimerBtns(name, i)}</div>
      </div>
    </div>`;
  }).join('');
}

/* =====================================================
   STOPWATCH CONTROLS
===================================================== */
function swStart(name, idx) {
  if (swState !== 'idle') { showToast(`先に「${swSong}」を終了してください`); return; }
  swSong = name; swIdx = idx; swAccum = 0; swStartAt = Date.now(); swState = 'running';
  renderSongs();
  swTick = setInterval(() => {
    const el = document.getElementById(`timer-disp-${swIdx}`);
    if (el) el.textContent = formatTime(getElapsed());
  }, 500);
  requestWakeLock();
}

function swPause() {
  if (swState !== 'running') return;
  swAccum = getElapsed(); swState = 'paused';
  clearInterval(swTick); swTick = null;
  renderSongs(); releaseWakeLock();
}

function swResume() {
  if (swState !== 'paused') return;
  swStartAt = Date.now(); swState = 'running';
  renderSongs();
  swTick = setInterval(() => {
    const el = document.getElementById(`timer-disp-${swIdx}`);
    if (el) el.textContent = formatTime(getElapsed());
  }, 500);
  requestWakeLock();
}

function swEnd() {
  if (swState === 'idle') return;
  clearInterval(swTick); swTick = null;
  const elapsed  = getElapsed();
  const songName = swSong;
  swState = 'idle'; swSong = null; swIdx = -1; swAccum = 0; swStartAt = 0;
  releaseWakeLock();
  const mins = db.addSession(songName, elapsed);
  renderSongs(); renderStats();
  if (mins) showToast(`${mins}分を記録しました！`);
  else      showToast('1分未満は記録されません');
}

/* =====================================================
   EVENT DELEGATION
===================================================== */
document.getElementById('songList').addEventListener('click', e => {
  const startBtn  = e.target.closest('.btn-start');
  const pauseBtn  = e.target.closest('.btn-pause');
  const resumeBtn = e.target.closest('.btn-resume');
  const endBtn    = e.target.closest('.btn-end');
  const delBtn    = e.target.closest('.btn-del');

  if (startBtn && !startBtn.disabled) {
    const i = parseInt(startBtn.dataset.idx, 10);
    swStart(db.getSongs()[i], i);
  } else if (pauseBtn)  { swPause(); }
  else if (resumeBtn)   { swResume(); }
  else if (endBtn)      { swEnd(); }
  else if (delBtn) {
    e.stopPropagation();
    const i = parseInt(delBtn.dataset.del, 10);
    deleteSong(i);
  }
});

/* =====================================================
   SONG ADD / DELETE
===================================================== */
function addSong() {
  const input = document.getElementById('songInput');
  const name  = input.value.trim();
  if (!name) { input.focus(); return; }
  const songs = db.getSongs();
  if (songs.includes(name)) { showToast('同じ曲名が既にあります'); return; }
  songs.push(name); db.saveSongs(songs);
  input.value = ''; renderSongs();
  showToast(`「${name}」を追加しました`);
}

function deleteSong(idx) {
  const songs = db.getSongs(); const name = songs[idx]; if (!name) return;
  if (swState !== 'idle' && swSong === name) { showToast('練習中の曲は削除できません'); return; }
  songs.splice(idx, 1); db.saveSongs(songs);
  renderSongs(); renderStats();
  showToast(`「${name}」を削除しました`);
}

document.getElementById('btnAdd').addEventListener('click', addSong);
document.getElementById('songInput').addEventListener('keydown', e => { if (e.key==='Enter') addSong(); });

/* =====================================================
   WAKE LOCK
===================================================== */
let wakeLock = null;
async function requestWakeLock() {
  try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch(_) {}
}
function releaseWakeLock() { wakeLock?.release().catch(()=>{}); wakeLock = null; }
document.addEventListener('visibilitychange', async () => {
  if (swState === 'running' && document.visibilityState === 'visible') requestWakeLock();
});

/* =====================================================
   STATISTICS
===================================================== */
let currentTab = 'today';
function getRange(tab) {
  const t = todayStr();
  if (tab==='today') return [t, t];
  if (tab==='week')  return [getWeekStart(), t];
  if (tab==='month') return [getMonthStart(), t];
}
function renderStats() {
  const [start,end] = getRange(currentTab);
  const sessions = db.getSessions(), songs = db.getSongs(), totals = {};
  sessions.forEach(s => { if(s.date>=start&&s.date<=end) totals[s.songName]=(totals[s.songName]||0)+s.duration; });
  const active = songs.filter(n=>totals[n]);
  const list   = document.getElementById('statsList');
  const totEl  = document.getElementById('statsTotal');
  const totV   = document.getElementById('statsTotalVal');
  if (!active.length) { list.innerHTML='<p class="empty-msg">この期間の練習記録はありません</p>'; totEl.style.display='none'; return; }
  const rows = active.map(n=>({name:n,mins:totals[n]})).sort((a,b)=>b.mins-a.mins);
  list.innerHTML = rows.map(r=>`<div class="stat-row"><span class="stat-song">${esc(r.name)}</span><span class="stat-mins">${r.mins}<span class="stat-unit">分</span></span></div>`).join('');
  totV.textContent = rows.reduce((t,r)=>t+r.mins,0);
  totEl.style.display = 'flex';
}
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    currentTab = btn.dataset.tab;
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    btn.classList.add('active'); renderStats();
  });
});
